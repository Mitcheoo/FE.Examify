<div class="flex h-screen bg-gray-100">
  <aside
    class="flex flex-col bg-gradient-to-b from-blue-600 to-blue-800 text-white transition-all duration-300"
    [ngClass]="sidebarOpen ? 'w-64' : 'w-20'"
  >
    <div class="flex h-20 items-center justify-between border-b border-blue-700 px-4">
      <span *ngIf="sidebarOpen" class="text-2xl font-bold">Examify</span>
      <span *ngIf="!sidebarOpen" class="text-2xl font-bold">E</span>
    </div>

    <nav class="mt-8">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="bg-blue-700"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="mx-2 flex items-center gap-4 rounded-lg px-4 py-3 transition-colors duration-200 hover:bg-blue-700"
      >
        <span *ngIf="sidebarOpen" class="truncate">{{ item.label }}</span>
      </a>
    </nav>

    <div class="flex-1"></div>

    <div class="border-t border-blue-700 p-4">
      <button
        type="button"
        (click)="logout()"
        class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-white transition-colors duration-200 hover:bg-red-600"
      >
        <span class="min-w-8 text-center font-semibold">X</span>
        <span *ngIf="sidebarOpen" class="truncate">Logout</span>
      </button>
    </div>
  </aside>

  <div class="flex flex-1 flex-col overflow-hidden">
    <nav class="flex h-20 items-center justify-between border-b border-gray-200 bg-white px-8 shadow-md">
      <div class="flex items-center gap-4">
        <button
          type="button"
          (click)="toggleSidebar()"
          aria-label="Toggle sidebar"
          class="rounded-lg p-2 transition-colors duration-200 hover:bg-gray-100"
        >
          <span class="text-2xl">&#9776;</span>
        </button>
        <h2 class="text-2xl font-bold text-gray-800">Admin Dashboard</h2>
      </div>

      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="font-semibold text-gray-800">{{ userFullName }}</p>
          <p class="text-xs text-gray-500">Admin</p>
        </div>
        <div
          class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-600 font-semibold text-white"
          aria-hidden="true"
        >
          {{ userFullName.charAt(0).toUpperCase() }}
        </div>
      </div>
    </nav>

    <main class="flex-1 overflow-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
