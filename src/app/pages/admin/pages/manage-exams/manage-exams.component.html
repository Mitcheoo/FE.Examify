<div class="space-y-8">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Manage Exam</h1>
      <p class="mt-2 text-gray-600">Create, edit, and publish exam content from the admin dashboard.</p>
    </div>
    <a routerLink="/exam-list" class="inline-flex items-center justify-center rounded-3xl bg-blue-600 px-5 py-3 text-white shadow-sm hover:bg-blue-700 transition">
      View Exam Library
    </a>
  </div>

  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex items-center justify-between mb-4">
      <div>
        <p class="text-sm text-gray-500">Total exams</p>
        <p class="mt-2 text-3xl font-semibold text-blue-600">{{ exams.length }}</p>
      </div>
      <button class="rounded-3xl bg-emerald-600 px-4 py-2 text-white hover:bg-emerald-700 transition">New exam</button>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full text-left text-sm text-gray-700">
        <thead class="border-b border-slate-200 bg-slate-50 text-xs uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-4 py-3">Exam title</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Created</th>
            <th class="px-4 py-3">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-200">
          <tr *ngFor="let exam of exams">
            <td class="px-4 py-4">{{ exam.title }}</td>
            <td class="px-4 py-4">
              <span class="rounded-full px-3 py-1 text-xs font-semibold" [ngClass]="exam.status === 'Published' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700'">
                {{ exam.status }}
              </span>
            </td>
            <td class="px-4 py-4">{{ exam.created }}</td>
            <td class="px-4 py-4">
              <button class="rounded-full border border-slate-300 px-3 py-1 text-sm text-slate-700 hover:bg-slate-50 transition">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
