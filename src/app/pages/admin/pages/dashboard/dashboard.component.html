<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-bold text-gray-900">Welcome, {{ userFullName }}</h1>
    <p class="mt-2 text-gray-600">Review and manage Examify content from the admin dashboard.</p>
  </div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
    <div class="rounded-3xl bg-white p-6 shadow-sm">
      <p class="text-sm text-gray-500">Total exams</p>
      <p class="mt-2 text-3xl font-semibold text-blue-600">{{ stats.totalExams }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm">
      <p class="text-sm text-gray-500">Published exams</p>
      <p class="mt-2 text-3xl font-semibold text-emerald-600">{{ stats.publishedExams }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm">
      <p class="text-sm text-gray-500">Draft exams</p>
      <p class="mt-2 text-3xl font-semibold text-slate-600">{{ stats.draftExams }}</p>
    </div>
  </div>

  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-xl font-semibold text-gray-900">Exam management</h2>
    <p class="mt-2 text-gray-600">Create, edit, review, and publish exams from one place.</p>
    <a
      routerLink="/admin/manage-exams"
      class="mt-5 inline-flex rounded-3xl bg-blue-600 px-5 py-3 font-medium text-white transition hover:bg-blue-700"
    >
      Manage Exams
    </a>
  </div>
</div>
