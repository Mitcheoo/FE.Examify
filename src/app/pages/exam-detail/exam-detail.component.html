<div class="exam-detail-container">
  <!-- Loading -->
  <div class="loading" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Đang tải đề thi...</p>
  </div>

  <!-- Error -->
  <div class="error-state" *ngIf="!isLoading && errorMessage">
    <p>{{ errorMessage }}</p>
    <button class="btn-retry" routerLink="/exam-list">← Quay lại danh sách</button>
  </div>

  <!-- Content -->
  <div *ngIf="!isLoading && !errorMessage && exam">
    <!-- Header -->
    <div class="exam-header">
      <h1>{{ exam.title }}</h1>
      <p>{{ exam.description || 'Luyện thi VSTEP 4 kỹ năng' }}</p>
    </div>

    <!-- Skills Grid -->
    <div class="skills-container">
      <div *ngFor="let skill of skills" class="skill-card" [class.completed]="skill.status === 'completed'">
        <div class="skill-icon">{{ getSkillIcon(skill.skillType) }}</div>
        <div class="skill-info">
          <h3>{{ skill.skillName }}</h3>
          <p>⏱️ {{ skill.duration }} phút</p>
          <div class="skill-status">
            <span class="status-badge" [class]="skill.status">{{ getStatusText(skill.status) }}</span>
            <span *ngIf="skill.score !== undefined && skill.score !== null" class="skill-score">
              Điểm: {{ skill.score }}/10
            </span>
          </div>
        </div>
        <button class="btn-start-skill" [disabled]="skill.status === 'locked'" (click)="startSkill(skill.skillType)">
          {{ skill.status === 'completed' ? 'Xem lại' : (skill.status === 'in-progress' ? 'Tiếp tục' : 'Làm bài') }}
        </button>
      </div>
    </div>

    <!-- Full Test Result Button (chỉ hiện khi hoàn thành 4 kỹ năng) -->
    <div class="fulltest-result-btn" *ngIf="checkFullTestCompletion()">
      <button class="btn-view-result" (click)="viewFullTestResult()">
        📊 Xem kết quả Full Test
      </button>
    </div>

    <!-- Footer -->
    <div class="exam-footer">
      <button class="btn-back" routerLink="/exam-list">← Quay lại danh sách</button>
    </div>
  </div>
</div>
