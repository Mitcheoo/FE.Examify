<div class="exam-list-container">
  <div class="page-header">
    <h1>📚 Danh sách đề thi VSTEP</h1>
    <p>Chọn đề thi phù hợp với trình độ của bạn</p>
  </div>

  <div class="loading" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Đang tải đề thi...</p>
  </div>

  <div class="exam-grid" *ngIf="!isLoading && filteredExams.length > 0">
    <div class="exam-card" *ngFor="let exam of filteredExams" (click)="onExamClick(exam)">
      <div class="exam-card-content">
        <h3>{{ exam.title }}</h3>
        <p>{{ exam.description || 'Đề thi đầy đủ 4 kỹ năng Reading, Listening, Writing, Speaking' }}</p>
        <div class="exam-meta">
          <span class="price">{{ (exam.price || 15000).toLocaleString() }}đ</span>
        </div>
        <button class="btn-start">Bắt đầu</button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!isLoading && filteredExams.length === 0">
    <p>Không tìm thấy đề thi phù hợp</p>
  </div>
</div>
